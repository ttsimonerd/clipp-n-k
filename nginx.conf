server {
    listen 80;
    server_name _;

    # Allow large uploads — the API server enforces the configured per-user
    # and per-clip size limits; nginx should not impose a lower hard cap.
    client_max_body_size 0;

    # Increase timeouts for large video uploads and slow connections.
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;
    proxy_connect_timeout  10s;

    # ── API routes ────────────────────────────────────────────────────────────
    # /api/* — JSON REST API and auth callbacks
    # /c/*   — server-rendered share pages with Open Graph meta tags
    location ~ ^/(api|c)(/|$) {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;

        # Pass real client info so Express trust-proxy can set req.ip and
        # compute req.protocol (needed for secure session cookies).
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable buffering for video streaming responses so bytes flow through
        # to the client as they arrive from the Express streaming handler.
        proxy_buffering    off;
    }

    # ── Static SPA ────────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Standard SPA fallback: serve the file if it exists (JS/CSS/assets),
        # otherwise hand off to index.html so wouter can handle client-side routing.
        try_files $uri $uri/ /index.html;

        # Cache immutable Vite-hashed assets aggressively; revalidate everything
        # else on each navigation.
        location ~* \.(js|css|woff2?|png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
