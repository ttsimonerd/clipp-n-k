# ─────────────────────────────────────────────────────────────────────────────
# clipp'n'k — pre-built image variant
#
# Uses images published to GitHub Container Registry on each release tag,
# so no local build toolchain is required.
#
# Quick start:
#   cp .env.example .env    # fill in required values
#   docker compose -f docker-compose.prebuilt.yml up -d
#
# To pin a specific release instead of tracking `latest`, set IMAGE_TAG in
# your .env file:
#   IMAGE_TAG=1.2.3
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: clippnk
      POSTGRES_USER: clippnk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clippnk -d clippnk"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── DB schema push ───────────────────────────────────────────────────────────
  migrate:
    image: ghcr.io/ttsimonerd/clipp-n-k-st/migrator:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgresql://clippnk:${POSTGRES_PASSWORD}@db:5432/clippnk
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── API server ───────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/ttsimonerd/clipp-n-k-st/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://clippnk:${POSTGRES_PASSWORD}@db:5432/clippnk

      # Auth & sessions
      SESSION_SECRET: ${SESSION_SECRET}

      # Discord OAuth — create an app at https://discord.com/developers/applications
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      # Must exactly match the redirect URI in your Discord app's OAuth2 settings.
      # Example: https://clips.example.com/api/auth/discord/callback
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}

      # Comma-separated Discord user IDs that get admin access.
      ADMIN_DISCORD_IDS: ${ADMIN_DISCORD_IDS}

      # Storage — defaults to local disk inside the container.
      # Set STORAGE_DRIVER=s3 and the S3_* vars to use S3-compatible storage.
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_LOCAL_DIR: /app/data/clips

      # S3-compatible storage (only needed when STORAGE_DRIVER=s3)
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}

      # GitHub OAuth — optional; only needed for the +1 GB star-bonus feature.
      # Create an OAuth app at https://github.com/settings/developers
      # Callback URL: https://clips.example.com/api/auth/github/callback
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}

    volumes:
      # Persistent clip storage for local-disk driver.
      # Ignored when STORAGE_DRIVER=s3.
      - clips-data:/app/data/clips
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Web frontend + reverse proxy ─────────────────────────────────────────────
  # nginx serves the Vite SPA as static files and proxies /api and /c to the
  # api container. This is the only service that binds a host port.
  web:
    image: ghcr.io/ttsimonerd/clipp-n-k-st/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - api

volumes:
  db-data:
  clips-data:
